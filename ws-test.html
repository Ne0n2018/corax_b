<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Corax — WS Admin Tester</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0f0f0f; color: #e0e0e0; display: flex; height: 100vh; }
    .sidebar { width: 280px; min-width: 280px; background: #1a1a1a; border-right: 1px solid #2e2e2e; display: flex; flex-direction: column; padding: 16px; gap: 12px; overflow-y: auto; }
    .sidebar h2 { font-size: 14px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .status { font-size: 13px; padding: 6px 10px; border-radius: 4px; background: #2a2a2a; }
    .status.connected { color: #4caf50; }
    .status.disconnected { color: #f44336; }
    .status.authed { color: #ff9800; }
    label { font-size: 12px; color: #888; margin-bottom: 2px; display: block; }
    input, select { width: 100%; padding: 6px 8px; background: #252525; border: 1px solid #333; border-radius: 4px; color: #e0e0e0; font-family: monospace; font-size: 12px; }
    input[type="password"] { letter-spacing: 1px; }
    button { width: 100%; padding: 8px; border: none; border-radius: 4px; cursor: pointer; font-family: monospace; font-size: 12px; font-weight: bold; transition: opacity .15s; }
    button:disabled { opacity: .4; cursor: default; }
    .btn-login      { background: #9c27b0; color: #fff; }
    .btn-logout     { background: #444; color: #ccc; }
    .btn-connect    { background: #2196f3; color: #fff; }
    .btn-disconnect { background: #555; color: #fff; }
    .btn-send       { background: #4caf50; color: #fff; }
    .btn-clear      { background: #333; color: #aaa; }
    .divider { border: none; border-top: 1px solid #2e2e2e; }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .log { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
    .log-entry { padding: 8px 10px; border-radius: 4px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
    .log-entry.info  { background: #1e2a3a; border-left: 3px solid #2196f3; }
    .log-entry.in    { background: #1a2e1a; border-left: 3px solid #4caf50; }
    .log-entry.out   { background: #2a2a1a; border-left: 3px solid #ff9800; }
    .log-entry.error { background: #2e1a1a; border-left: 3px solid #f44336; }
    .log-entry.auth  { background: #2a1a3a; border-left: 3px solid #9c27b0; }
    .log-entry .ts   { color: #555; font-size: 10px; }
    .log-entry .ev   { color: #aaa; font-size: 11px; margin-bottom: 2px; }
    textarea { width: 100%; padding: 6px 8px; background: #252525; border: 1px solid #333; border-radius: 4px; color: #e0e0e0; font-family: monospace; font-size: 12px; resize: vertical; }
    .section-title { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .user-badge { font-size: 11px; color: #ff9800; padding: 4px 8px; background: #2a2010; border-radius: 4px; word-break: break-all; }
  </style>
</head>
<body>

<div class="sidebar">
  <h2>Corax WS Tester</h2>

  <!-- Connection status -->
  <div id="statusEl" class="status disconnected">● Disconnected</div>

  <hr class="divider" />

  <!-- ── AUTH ── -->
  <div class="section-title">Auth</div>

  <div>
    <label>Server URL</label>
    <input id="url" value="http://localhost:4000" />
  </div>
  <div>
    <label>Email</label>
    <input id="email" type="email" value="beevertm@gmail.com" />
  </div>
  <div>
    <label>Password</label>
    <input id="password" type="password" placeholder="минимум 6 символов" />
  </div>

  <button class="btn-login" id="btnLogin" onclick="login()">Login</button>
  <button class="btn-logout" id="btnLogout" onclick="logout()" disabled>Logout</button>

  <div id="userBadge" style="display:none" class="user-badge"></div>

  <hr class="divider" />

  <!-- ── SOCKET ── -->
  <div class="section-title">WebSocket</div>

  <div>
    <label>Namespace</label>
    <input id="ns" value="/admin/orders" />
  </div>

  <button class="btn-connect" id="btnConnect" onclick="connect()" disabled>Connect</button>
  <button class="btn-disconnect" id="btnDisconnect" onclick="disconnect()" disabled>Disconnect</button>

  <hr class="divider" />

  <!-- ── EVENTS ── -->
  <div class="section-title">Send event</div>

  <div>
    <label>Event name</label>
    <select id="eventName" onchange="fillPayload()">
      <option value="orders:getAll">orders:getAll</option>
      <option value="orders:getById">orders:getById</option>
      <option value="orders:updateStatus">orders:updateStatus</option>
    </select>
  </div>

  <div>
    <label>Payload (JSON)</label>
    <textarea id="payload" rows="5">{ "page": 1, "limit": 20 }</textarea>
  </div>

  <button class="btn-send" id="btnSend" onclick="sendEvent()" disabled>Send ▶</button>

  <hr class="divider" />
  <button class="btn-clear" onclick="clearLog()">Clear log</button>
</div>

<div class="main">
  <div class="log" id="log"></div>
</div>

<script>
  let socket = null;
  let isLoggedIn = false;

  const presets = {
    'orders:getAll':       '{ "page": 1, "limit": 20 }',
    'orders:getById':      '{ "orderId": "PASTE_ORDER_ID_HERE" }',
    'orders:updateStatus': '{ "orderId": "PASTE_ORDER_ID_HERE", "status": "SHIPPED" }',
  };

  function fillPayload() {
    const ev = document.getElementById('eventName').value;
    document.getElementById('payload').value = presets[ev] ?? '{}';
  }

  // ── AUTH ────────────────────────────────────────────────────────────────────

  async function login() {
    const baseUrl   = document.getElementById('url').value.trim();
    const email     = document.getElementById('email').value.trim();
    const password  = document.getElementById('password').value;

    log('auth', 'login', `POST ${baseUrl}/auth/login  →  ${email}`);

    try {
      const res = await fetch(`${baseUrl}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',          // сохраняет session-куку
        body: JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        log('error', 'login', `${res.status}  ${JSON.stringify(data, null, 2)}`);
        return;
      }

      isLoggedIn = true;
      const displayName = data.email ?? data.user?.email ?? email;
      document.getElementById('userBadge').textContent = `✓ ${displayName}`;
      document.getElementById('userBadge').style.display = 'block';
      document.getElementById('btnLogin').disabled    = true;
      document.getElementById('btnLogout').disabled   = false;
      document.getElementById('btnConnect').disabled  = false;
      log('auth', 'login', `OK  ${JSON.stringify(data, null, 2)}`);

    } catch (err) {
      log('error', 'login', err.message);
    }
  }

  async function logout() {
    const baseUrl = document.getElementById('url').value.trim();
    try {
      await fetch(`${baseUrl}/auth/logout`, { method: 'POST', credentials: 'include' });
    } catch { /* ignore */ }

    disconnect();
    isLoggedIn = false;
    document.getElementById('userBadge').style.display = 'none';
    document.getElementById('btnLogin').disabled    = false;
    document.getElementById('btnLogout').disabled   = true;
    document.getElementById('btnConnect').disabled  = true;
    log('auth', 'logout', 'Session cleared');
  }

  // ── SOCKET ──────────────────────────────────────────────────────────────────

  function connect() {
    const url = document.getElementById('url').value.trim();
    const ns  = document.getElementById('ns').value.trim();

    if (socket) socket.disconnect();

    log('info', 'system', `Connecting to ${url}${ns}…`);

    socket = io(url + ns, {
      transports: ['websocket'],
      withCredentials: true,
    });

    socket.on('connect', () => {
      setStatus('connected');
      document.getElementById('btnSend').disabled       = false;
      document.getElementById('btnDisconnect').disabled = false;
      document.getElementById('btnConnect').disabled    = true;
      log('info', 'system', `Connected  id=${socket.id}`);
    });

    socket.on('disconnect', (reason) => {
      setStatus('disconnected');
      document.getElementById('btnSend').disabled       = true;
      document.getElementById('btnDisconnect').disabled = true;
      document.getElementById('btnConnect').disabled    = false;
      log('info', 'system', `Disconnected: ${reason}`);
    });

    socket.on('connect_error', (err) => {
      setStatus('disconnected');
      document.getElementById('btnConnect').disabled = false;
      log('error', 'connect_error', err.message);
    });

    ['orders:list', 'orders:detail', 'orders:statusUpdated', 'orders:error'].forEach(ev => {
      socket.on(ev, (data) => log('in', ev, JSON.stringify(data, null, 2)));
    });
  }

  function disconnect() {
    if (socket) { socket.disconnect(); socket = null; }
  }

  function sendEvent() {
    if (!socket?.connected) { log('error', 'system', 'Not connected'); return; }
    const ev = document.getElementById('eventName').value;
    let payload;
    try {
      payload = JSON.parse(document.getElementById('payload').value);
    } catch {
      log('error', 'system', 'Invalid JSON in payload'); return;
    }
    socket.emit(ev, payload);
    log('out', ev, JSON.stringify(payload, null, 2));
  }

  // ── HELPERS ─────────────────────────────────────────────────────────────────

  function clearLog() { document.getElementById('log').innerHTML = ''; }

  function setStatus(state) {
    const el = document.getElementById('statusEl');
    const labels = { connected: '● Connected', disconnected: '● Disconnected', authed: '● Authenticated' };
    el.textContent = labels[state] ?? state;
    el.className = `status ${state}`;
  }

  function log(type, event, message) {
    const el = document.getElementById('log');
    const ts = new Date().toLocaleTimeString('ru', { hour12: false });
    const entry = document.createElement('div');
    entry.className = `log-entry ${type}`;
    entry.innerHTML = `<div class="ts">${ts}</div><div class="ev">${event}</div>${escHtml(message)}`;
    el.appendChild(entry);
    el.scrollTop = el.scrollHeight;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
